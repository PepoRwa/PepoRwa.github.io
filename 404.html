<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOWRAX | 404_LIAISON_PERDUE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/global.js" defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;900&family=Poppins:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --abyss: #050508; 
            --magenta: #D62F7F; 
            --cyan: #00F0FF;
            --purple: #6F2DBD;
        }

        body, html { 
            background: var(--abyss); 
            color: #fff; 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* Fond stellaire GOWRAX */
        #starCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }
        .film-grain { position: fixed; inset: 0; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 1; }

        .content-box { 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            padding: 0 20px; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
        }

        .tech-font { font-family: 'Share Tech Mono', monospace; }
        .title-font { font-family: 'Rajdhani', sans-serif; }

        /* Effet 404 Halo & Glitch */
        .halo-404 {
            font-size: clamp(8rem, 25vw, 16rem); 
            font-weight: 900; 
            line-height: 0.8;
            color: #fff;
            position: relative;
            animation: pulseHalo 4s infinite ease-in-out;
            letter-spacing: -0.05em;
        }

        @keyframes pulseHalo {
            0%, 100% { text-shadow: 0 0 20px rgba(214, 47, 127, 0.3), 0 0 40px rgba(111, 45, 189, 0.2); }
            50% { text-shadow: 0 0 40px rgba(214, 47, 127, 0.7), 0 0 70px rgba(0, 240, 255, 0.4); }
        }

        /* Boutons Style GOWRAX */
        .btn-grx {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 16px 32px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            width: 100%;
        }
        @media (min-width: 640px) { .btn-grx { width: auto; min-width: 200px; } }

        .btn-grx::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-grx:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            transform: translateY(-3px);
            color: var(--cyan);
        }

        .btn-grx:hover::before { left: 100%; }

        /* Curseur Custom */
        #custom-cursor { width: 30px; height: 30px; border: 1px solid var(--magenta); position: fixed; pointer-events: none !important; z-index: 1000; border-radius: 50%; transition: transform 0.08s ease-out; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--magenta); display: none; }
        @media (min-width: 1024px) { body { cursor: none; } #custom-cursor { display: block; } }

        .error-code {
            position: absolute;
            bottom: 20px;
            left: 20px;
            opacity: 0.3;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div class="film-grain"></div>
    <canvas id="starCanvas"></canvas>

    <div class="content-box">
        <div class="tech-font text-magenta text-[10px] tracking-[0.5em] uppercase mb-4 flex items-center gap-3">
            <span class="w-2 h-2 bg-magenta rounded-full animate-ping"></span>
            Liaison_Interrompue // Error_404
        </div>
        
        <h1 class="title-font halo-404 italic uppercase">404</h1>
        
        <div class="mb-12 max-w-2xl">
            <h2 class="title-font text-3xl md:text-5xl font-extrabold uppercase tracking-tight mb-4">
                Secteur <span class="text-cyan">Introuvable.</span>
            </h2>
            <p class="text-gray-400 text-sm md:text-base leading-relaxed font-light">
                La liaison avec cette coordonnée a été perdue. <br class="hidden md:block">
                Soit la page a dodge la sélection, soit elle a pris un headshot de l'espace.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-6 w-full justify-center px-10 sm:px-0">
            <a href="/" class="btn-grx">
                Base_Accueil
            </a>
            <a href="/roster/index.html" class="btn-grx" style="border-color: rgba(214, 47, 127, 0.3); color: var(--magenta);">
                Unités_Roster
            </a>
        </div>

        <a href="https://x.com/team_gowrax" target="_blank" class="mt-20 group">
            <div class="tech-font text-[9px] text-gray-600 group-hover:text-white transition-colors tracking-[0.4em] uppercase flex items-center gap-3">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                Signaler une anomalie au HQ
            </div>
        </a>
    </div>

    <div class="error-code tech-font text-gray-500 uppercase tracking-widest">
        Trace_ID: GRX-VOID-404-01
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');
        
        let stars = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    opacity: Math.random(),
                    speed: Math.random() * 0.005 + 0.002
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.opacity += s.speed;
                if (s.opacity > 1 || s.opacity < 0) s.speed *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            if(cursor) {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
