<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOWRAX | TACTICAL_HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/global.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --abyss: #0B0C15; --magenta: #D62F7F; --void: #1A1C2E; }
        
        body { 
            background: var(--abyss); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .mono { font-family: 'Share Tech Mono', monospace; }

        /* Styles du Menu (Copie exacte) */
        .nav-link { transition: 0.4s; letter-spacing: 0.2em; position: relative; opacity: 0.6; }
        .nav-link:hover { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); opacity: 1 !important; }
        
        #mobile-nav { 
            display: none;
            background: rgba(2, 2, 5, 0.98);
            backdrop-filter: blur(20px);
        }
        #mobile-nav.active { display: flex; }

        #custom-cursor { 
            width: 30px; height: 30px; border: 1px solid var(--magenta); 
            position: fixed; pointer-events: none !important; z-index: 1000000; border-radius: 50%; 
            transition: transform 0.1s ease-out; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px var(--magenta); display: none;
        }
        #custom-cursor::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: var(--magenta); border-radius: 50%; transform: translate(-50%, -50%); }
        @media (min-width: 1024px) { body, html, * { cursor: none !important; } #custom-cursor { display: block; } }

        /* Le style VALORANT */
        .val-card {
            background: rgba(26, 28, 46, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }
        
        .val-card:hover {
            background: rgba(26, 28, 46, 0.8);
            border-color: rgba(214, 47, 127, 0.4);
            transform: translateY(-4px);
        }

        .val-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--magenta), transparent);
            opacity: 0; transition: 0.3s;
        }
        .val-card:hover::before { opacity: 1; }

        /* Filtres */
        .filter-group { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; scrollbar-width: none; }
        .filter-group::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            position: relative; color: #888; transition: 0.3s; white-space: nowrap;
        }
        .filter-btn:hover { color: #fff; }
        .filter-btn.active { color: var(--magenta); }
        .filter-btn.active::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px;
            background: var(--magenta); box-shadow: 0 0 10px var(--magenta);
        }

        .sub-filter-btn {
            padding: 4px 12px; border: 1px solid rgba(255,255,255,0.1); color: #888;
            font-size: 10px; text-transform: uppercase; transition: 0.3s; white-space: nowrap;
        }
        .sub-filter-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
        .sub-filter-btn.active { border-color: var(--magenta); color: var(--magenta); background: rgba(214,47,127,0.1); }

        /* Status Badges */
        .status-LIVE { background: #22c55e; color: #000; animation: pulse-live 2s infinite; }
        .status-UPCOMING { border: 1px solid var(--magenta); color: var(--magenta); }
        .status-FINISHED { background: #4b5563; color: #fff; }
        .status-POSTPONED { background: #eab308; color: #000; }
        .status-CANCELED { background: #dc2626; color: #fff; text-decoration: line-through; }

        @keyframes pulse-live {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .header-bg { background: radial-gradient(circle at 50% 0%, rgba(214, 47, 127, 0.15), transparent 70%); }
    </style>
</head>
<body class="flex flex-col bg-[#050508]">

    <div id="custom-cursor"></div>

    <header class="p-6 flex justify-between items-center border-b border-white/10 backdrop-blur-xl bg-black/40 z-[100]">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 border border-magenta rotate-45 flex items-center justify-center">
                <div class="w-4 h-4 bg-magenta animate-pulse rotate-[-45deg]"></div>
            </div>
            <div class="font-bold text-2xl text-white tracking-tighter uppercase leading-none">
                GOWRAX<span class="text-magenta italic">_SCHEDULE</span>
            </div>
        </div>
        
        <nav class="hidden lg:flex space-x-10 text-[10px] font-bold tracking-[0.4em] mono">
            <a href="/" class="nav-link">INDEX</a>
            <a href="/news/index.html" class="nav-link">NEWS</a>
            <a href="/staff/index.html" class="nav-link">STAFF</a>
            <a href="/ceo/index.html" class="nav-link">COMMAND</a>
            <a href="/profiles/index.html" class="nav-link">DATABASE</a>
            <a href="/roster/index.html" class="nav-link">UNITS</a>
            <a href="/roster/calendar.html" class="text-magenta underline underline-offset-8 decoration-2">CALENDRIER</a>
            <a href="/contact/index.html" class="nav-link">SIGNAL</a>
        </nav>

        <div class="flex items-center">
            <button onclick="toggleNav(true)" class="lg:hidden text-magenta border border-magenta/40 p-2 hover:bg-magenta hover:text-white transition-all z-[110] pointer-events-auto">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </header>

    <div id="mobile-nav" class="fixed inset-0 z-[999999] p-12 flex flex-col justify-center items-center space-y-8 opacity-0 pointer-events-none transition-all duration-500">
        <button onclick="toggleNav(false)" class="absolute top-10 right-10 text-magenta font-mono text-sm border border-magenta/40 px-6 py-2 uppercase pointer-events-auto">Close_X</button>
        <a href="/" class="text-4xl font-rajdhani font-bold text-magenta italic pointer-events-auto" onclick="toggleNav(false)">INDEX</a>
        <a href="/news/index.html" class="text-2xl font-rajdhani tracking-widest pointer-events-auto" onclick="toggleNav(false)">NEWS</a>
        <a href="/staff/index.html" class="text-2xl font-rajdhani tracking-widest pointer-events-auto" onclick="toggleNav(false)">STAFF</a>
        <a href="/ceo/index.html" class="text-2xl font-rajdhani tracking-widest pointer-events-auto" onclick="toggleNav(false)">COMMAND</a>
        <a href="/profiles/index.html" class="text-2xl font-rajdhani tracking-widest pointer-events-auto" onclick="toggleNav(false)">DATABASE</a>
        <a href="/roster/index.html" class="text-2xl font-rajdhani tracking-widest pointer-events-auto" onclick="toggleNav(false)">ROSTERS</a>
        <a href="/roster/calendar.html" class="text-2xl font-rajdhani tracking-widest border border-magenta/40 px-10 py-3 text-magenta pointer-events-auto" onclick="toggleNav(false)">CALENDRIER</a>
        <a href="/contact/index.html" class="text-2xl font-rajdhani tracking-widest pointer-events-auto" onclick="toggleNav(false)">SIGNAL</a>
    </div>

    <main class="flex-1 w-full max-w-7xl mx-auto px-4 md:px-8 py-12 relative z-10">
        <div class="absolute inset-0 header-bg pointer-events-none z-0"></div>

        <div class="relative z-10 mb-8 flex flex-col lg:flex-row justify-between lg:items-end gap-6 border-b border-white/10 pb-6">
            <div>
                <p class="mono text-magenta text-[10px] tracking-[0.5em] uppercase mb-2">// MATCH_CENTER</p>
                <h1 class="text-5xl md:text-7xl lg:text-8xl font-black italic tracking-tighter uppercase leading-none drop-shadow-lg">
                    CALENDRIER
                </h1>
            </div>
            
            <div class="filter-group" id="game-filters">
                </div>
        </div>

        <div class="relative z-10 mb-10 flex flex-col md:flex-row gap-4 border-b border-white/5 pb-4" id="sub-filters-container">
            <div class="flex gap-2 overflow-x-auto mono" id="status-filters">
                <button class="sub-filter-btn active" onclick="setStatusFilter('ALL', this)">TOUT</button>
                <button class="sub-filter-btn" onclick="setStatusFilter('UPCOMING', this)">À VENIR</button>
                <button class="sub-filter-btn" onclick="setStatusFilter('LIVE', this)">LIVE</button>
                <button class="sub-filter-btn" onclick="setStatusFilter('FINISHED', this)">TERMINÉ</button>
            </div>
            <div class="flex gap-2 overflow-x-auto mono" id="tier-filters">
                </div>
        </div>

        <div id="match-grid" class="relative z-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 mono text-gray-500 animate-pulse">
                DÉCRYPTAGE DES DONNÉES SATELLITES...
            </div>
        </div>

    </main>

    <footer class="p-4 bg-black border-t border-white/5 mono text-[8px] md:text-[9px] flex justify-between text-gray-500 z-[100] mt-auto">
        <div class="flex gap-4 md:gap-6">
            <span class="hidden xs:inline text-green-500">DATABASE: SYNCED</span>
            <span>MISSIONS: ACTIVE</span>
        </div>
        <div class="animate-pulse text-magenta text-right">ALL SYSTEMS ONLINE // READY FOR DEPLOYMENT</div>
    </footer>

    <script>
        // CURSEUR CUSTOM
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; 
        });

        // MENU MOBILE
        function toggleNav(state) { 
            const nav = document.getElementById('mobile-nav');
            if(state) {
                nav.classList.add('active');
                setTimeout(() => { nav.style.opacity = '1'; nav.style.pointerEvents = 'auto'; }, 10);
            } else {
                nav.style.opacity = '0'; nav.style.pointerEvents = 'none';
                setTimeout(() => nav.classList.remove('active'), 500);
            }
        }

        // LOGIQUE CALENDRIER
        const SUPABASE_URL = 'https://nvtcjaallxoweujbyhng.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52dGNqYWFsbHhvd2V1amJ5aG5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDc4OTEsImV4cCI6MjA4NzQyMzg5MX0.a0FkgYwG3yxu0GMXA6wV-6GqFamB9Pu-E57_z6KkHik';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DEFAULT_OPP_LOGO = "/assets/img/logo-team-esport.png"; 
        const GRX_LOGO = "/assets/img/logo-team-esport.png"; 
        
        let allMatches = [];
        let activeGameFilter = 'ALL';
        let activeStatusFilter = 'ALL';
        let activeTierFilter = 'ALL';

        async function initMatchCenter() {
            const { data, error } = await _supabase.from('events').select('*').order('date', { ascending: false });
            
            if (error) {
                document.getElementById('match-grid').innerHTML = `<div class="col-span-full mono text-red-500">ERREUR SYSTEME: ${error.message}</div>`;
                return;
            }

            // --- GESTION DE LA TABLE 100% VIDE ---
            if (data.length === 0) {
                // On cache les filtres qui ne servent à rien
                document.getElementById('game-filters').innerHTML = '';
                document.getElementById('sub-filters-container').style.display = 'none';
                
                // On affiche le message d'alerte rouge
                document.getElementById('match-grid').innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 px-6 border border-red-500/30 bg-red-500/5 text-center relative overflow-hidden val-card">
                        <div class="absolute top-0 left-0 w-full h-1 bg-red-500/50"></div>
                        <svg class="w-16 h-16 text-red-500 mb-6 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        <h2 class="text-3xl md:text-4xl font-black italic tracking-widest text-red-500 uppercase mb-4 leading-none">
                            AUCUN DÉPLOIEMENT PROGRAMMÉ
                        </h2>
                        <p class="mono text-gray-400 text-xs md:text-sm max-w-2xl leading-relaxed uppercase tracking-widest">
                            L'équipe n'est pas encore officiellement inscrite à des tournois.<br><br>
                            Dès que les premiers tournois seront ouverts,<br>ils seront publiés ici.
                        </p>
                    </div>
                `;
                return; // On arrête l'exécution ici
            }

            allMatches = data.map(m => ({
                ...m,
                game: m.game.trim().toUpperCase(),
                tournament_tier: (m.tournament_tier || 'COMMUNAUTAIRE').trim().toUpperCase()
            }));

            buildFilters();
            applyFilters();
        }

        function buildFilters() {
            const games = [...new Set(allMatches.map(m => m.game))].sort();
            const gameTabs = document.getElementById('game-filters');
            
            let gameHtml = `<button class="filter-btn active text-xl md:text-3xl font-bold italic uppercase tracking-widest" onclick="setGameFilter('ALL', this)">ALL</button>`;
            games.forEach(game => {
                gameHtml += `<button class="filter-btn text-xl md:text-3xl font-bold italic uppercase tracking-widest" onclick="setGameFilter('${game}', this)">${game}</button>`;
            });
            gameTabs.innerHTML = gameHtml;

            const tiers = [...new Set(allMatches.map(m => m.tournament_tier))].sort();
            const tierTabs = document.getElementById('tier-filters');
            
            let tierHtml = `<button class="sub-filter-btn active" onclick="setTierFilter('ALL', this)">TOUS LES TIERS</button>`;
            tiers.forEach(tier => {
                tierHtml += `<button class="sub-filter-btn" onclick="setTierFilter('${tier}', this)">${tier}</button>`;
            });
            tierTabs.innerHTML = tierHtml;
        }

        function setGameFilter(game, btn) {
            document.querySelectorAll('#game-filters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeGameFilter = game;
            applyFilters();
        }

        function setStatusFilter(status, btn) {
            document.querySelectorAll('#status-filters .sub-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeStatusFilter = status;
            applyFilters();
        }

        function setTierFilter(tier, btn) {
            document.querySelectorAll('#tier-filters .sub-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeTierFilter = tier;
            applyFilters();
        }

        function applyFilters() {
            const grid = document.getElementById('match-grid');
            
            let filtered = allMatches.filter(m => {
                const matchGame = activeGameFilter === 'ALL' || m.game === activeGameFilter;
                const matchStatus = activeStatusFilter === 'ALL' || m.status === activeStatusFilter;
                const matchTier = activeTierFilter === 'ALL' || m.tournament_tier === activeTierFilter;
                return matchGame && matchStatus && matchTier;
            });
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 mono text-gray-500 border border-white/5 bg-white/5 val-card">AUCUN DÉPLOIEMENT NE CORRESPOND À CES PARAMÈTRES.</div>`;
                return;
            }

            grid.innerHTML = filtered.map(match => {
                const dateObj = new Date(match.date);
                const isFinished = match.status === 'FINISHED';
                const hasScores = match.team_grx_score !== null && match.opponent_score !== null;
                
                let centerDisplay = `<div class="text-2xl font-black italic text-gray-600 px-4">VS</div>`;
                if (isFinished && hasScores) {
                    const grxWon = match.team_grx_score > match.opponent_score;
                    centerDisplay = `
                        <div class="flex items-center gap-2 px-4 text-3xl font-black italic">
                            <span class="${grxWon ? 'text-green-500' : 'text-gray-400'}">${match.team_grx_score}</span>
                            <span class="text-gray-600">-</span>
                            <span class="${!grxWon ? 'text-green-500' : 'text-gray-400'}">${match.opponent_score}</span>
                        </div>
                    `;
                } else if (match.status === 'CANCELED') {
                    centerDisplay = `<div class="text-xl font-black italic text-red-500 px-2 line-through">N/A</div>`;
                }

                let statusLabel = match.status;
                if(match.status === 'UPCOMING') statusLabel = 'À VENIR';
                if(match.status === 'POSTPONED') statusLabel = 'REPORTÉ';
                if(match.status === 'CANCELED') statusLabel = 'ANNULÉ';
                if(match.status === 'FINISHED') statusLabel = 'TERMINÉ';

                const dateClass = match.status === 'CANCELED' ? 'line-through text-gray-600' : 'text-white';

                return `
                <div class="val-card p-6 flex flex-col justify-between group h-full">
                    
                    <div class="flex justify-between items-start border-b border-white/5 pb-4 mb-6">
                        <div class="flex items-center gap-3">
                            ${match.tournament_logo ? `<img src="${match.tournament_logo}" class="w-8 h-8 object-contain">` : ''}
                            <div>
                                <div class="flex items-center flex-wrap gap-2 mb-1">
                                    <div class="mono text-[9px] text-magenta uppercase tracking-[0.2em]">
                                        ${match.game}
                                    </div>
                                    <div class="mono text-[8px] border border-white/20 px-1 py-0.5 text-gray-400 uppercase">
                                        ${match.tournament_tier}
                                    </div>
                                    ${match.is_internal ? '<span class="mono text-[8px] bg-magenta/20 text-magenta px-1 py-0.5">INTERNE</span>' : ''}
                                </div>
                                <div class="font-bold uppercase tracking-widest text-lg leading-tight w-40 md:w-56 truncate" title="${match.tournament_name}">
                                    ${match.tournament_name}
                                </div>
                            </div>
                        </div>
                        <div class="status-${match.status} mono text-[9px] font-bold uppercase tracking-widest px-2 py-1 shrink-0">
                            ${statusLabel}
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-6">
                        <div class="flex flex-col items-center flex-1">
                            <img src="${GRX_LOGO}" class="w-14 h-14 object-contain mb-2 drop-shadow-[0_0_8px_rgba(214,47,127,0.5)]">
                            <span class="font-bold uppercase tracking-widest text-sm text-center line-clamp-1">${match.team_grx_name}</span>
                        </div>

                        ${centerDisplay}

                        <div class="flex flex-col items-center flex-1">
                            <img src="${match.opponent_logo || DEFAULT_OPP_LOGO}" class="w-14 h-14 object-contain mb-2 ${!match.opponent_logo ? 'grayscale opacity-40' : ''}">
                            <span class="font-bold uppercase tracking-widest text-sm text-center line-clamp-1">${match.opponent_name}</span>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <div class="flex flex-col sm:flex-row justify-between sm:items-end gap-4 mb-4">
                            <div class="${dateClass}">
                                <div class="text-2xl font-black italic tracking-tighter leading-none mb-1">
                                    ${dateObj.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'})}
                                </div>
                                <div class="mono text-[10px] text-gray-400 uppercase tracking-widest">
                                    ${dateObj.toLocaleDateString('fr-FR', {day:'2-digit', month:'long'})}
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-2 sm:gap-4 flex-wrap">
                                ${match.bracket_url ? `
                                <a href="${match.bracket_url}" target="_blank" class="mono text-[10px] uppercase text-gray-400 hover:text-white transition flex items-center gap-1 border border-white/10 px-2 py-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11V7a5 5 0 0110 0v4"></path></svg>
                                    BRACKET
                                </a>
                                ` : ''}
                                
                                ${match.stream_url && match.status !== 'CANCELED' ? `
                                <a href="${match.stream_url}" target="_blank" class="mono text-[10px] uppercase text-magenta hover:text-white transition flex items-center gap-1 border border-magenta/40 px-2 py-1 bg-magenta/10 hover:bg-magenta">
                                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                    WATCH
                                </a>
                                ` : ''}
                            </div>
                        </div>

                        ${match.team_grx_roster ? `
                        <div class="border-t border-white/5 pt-3 mt-2">
                            <div class="mono text-[8px] text-gray-500 uppercase tracking-widest mb-1">Roster Déployé:</div>
                            <div class="mono text-[10px] text-gray-300 truncate" title="${match.team_grx_roster}">
                                ${match.team_grx_roster.split(',').map(p => p.trim()).join(' <span class="text-magenta">/</span> ')}
                            </div>
                        </div>
                        ` : ''}
                    </div>

                </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', initMatchCenter);
    </script>
</body>
</html>
